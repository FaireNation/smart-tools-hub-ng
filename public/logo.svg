<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2340"/>
      <stop offset="100%" stop-color="#0d1220"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d040"/>
      <stop offset="100%" stop-color="#c48a0a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Subtle corner circuit nodes -->
  <circle cx="9"  cy="9"  r="2" fill="#d4a017" opacity="0.3"/>
  <circle cx="55" cy="9"  r="2" fill="#d4a017" opacity="0.3"/>
  <circle cx="9"  cy="55" r="2" fill="#d4a017" opacity="0.15"/>
  <circle cx="55" cy="55" r="2" fill="#d4a017" opacity="0.15"/>

  <!-- Lock shackle arch (counter-clockwise arc goes up/over) -->
  <path d="M 20 38 L 20 28 A 12 12 0 0 0 44 28 L 44 38"
        fill="none" stroke="url(#gold)" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lock body -->
  <rect x="11" y="36" width="42" height="24" rx="7" fill="url(#gold)"/>

  <!-- Lightning bolt (smart / power symbol) -->
  <path d="M 34 42 L 28 49 L 32 49 L 30 56 L 38 49 L 34 49 Z"
        fill="#0d1220"/>
</svg>
